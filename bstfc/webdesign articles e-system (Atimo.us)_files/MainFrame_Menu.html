	old_item = "new"
	function Toggle(item) {
		obj=document.getElementById(item);
		obj.style.display="block";
	    if (old_item == "new" || old_item == item) {
			if (old_item == item) {
				obj_old=document.getElementById(old_item);
				obj_old.style.display="none";
				old_item = "new"
			} else {
			old_item = item
			}
		} else {
			obj_old=document.getElementById(old_item);
			obj_old.style.display="none";
			old_item = item
		}
	}
	function setFrame(Right_m) {

	var down;

	function Display(min,sec) {
		var disp;
		if(min<=9) disp=" 0";
		else disp=" ";
		disp+=min+":";
		if(sec<=9) disp+="0"+sec;
		else disp+=sec;
		return(disp);
	}

	function CountDown() {
		cmin2=10;
		csec2=00;
		DownRepeat();
	}

	function DownRepeat() {
		csec2--;
		if(csec2==-1) {
		csec2=59; cmin2--;
	}
	v_clock = document.getElementById("_clock");
	v_clock.innerHTML = Display(cmin2,csec2);
	if((cmin2==0)&&(csec2==0))
		document.location.href = "MainFrame_Menu.asp?visit=1&id="
	else

	}
</script>
