<script language="JavaScript">
	var down;
	var min1,sec1;
	var cmin1,csec1,cmin2,csec2;
	
	function Minutes(data) {
		for(var i=0;i<data.length;i++) 
		if(data.substring(i,i+1)==":") 
		break;  
		return(data.substring(0,i)); 
	}
	
	function Seconds(data) {        
		for(var i=0;i<data.length;i++) 
		if(data.substring(i,i+1)==":") 
		break;  
		return(data.substring(i+1,data.length)); 
	}
	
	function Display(min,sec) {     
		var disp;       
		if(min<=9) disp=" 0";   
		else disp=" ";  
		disp+=min+":";  
		if(sec<=9) disp+="0"+sec;       
		else disp+=sec; 
		return(disp); 
	}
	
	function CountDown() {       
		cmin2=10;        
		csec2=00;        
		DownRepeat(); 
	}
	
	
	function DownRepeat() { 
		csec2--;        
		if(csec2==-1) { 
		csec2=59; cmin2--; 
	}   
	    
	v_clock = document.getElementById("_clock");
	v_clock.innerHTML = Display(cmin2,csec2);  
	if((cmin2==0)&&(csec2==0)) 
		document.location.href = "MainFrame_Menu.asp?visit=1&id="     
	else 
		down=setTimeout("DownRepeat()",1000); 
	}	

	
	
</script>
